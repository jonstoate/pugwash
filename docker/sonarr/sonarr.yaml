---
services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1001
      - PGID=1001
      - TZ=Australia/West
    volumes:
      - /opt/docker/sonarr/config:/config
      - /mnt/data:/mnt/data
    ports:
      - 8989:8989
    restart: unless-stopped

