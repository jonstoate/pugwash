---
services:
    watchtower:
        image: nickfedor/watchtower:latest
        container_name: watchtower
        environment:
            - TZ=Australia/West
            - WATCHTOWER_CLEANUP=true
            - WATCHTOWER_SCHEDULE=0 0 4 * * *
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        ports:
            - 8060:8080
        restart: unless-stopped
